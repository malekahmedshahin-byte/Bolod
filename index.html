<!DOCTYPE html>
<html lang="bn">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Verification Portal</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Hind+Siliguri:wght@400;600;700&family=Inter:wght@400;600;700&display=swap" rel="stylesheet">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Hind Siliguri', 'Inter', sans-serif;
        }

        body {
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            background: radial-gradient(circle at center, #1e293b 0%, #0f172a 100%);
            overflow: hidden;
            color: #f8fafc;
        }

        .card {
            background: rgba(30, 41, 59, 0.7);
            backdrop-filter: blur(16px);
            -webkit-backdrop-filter: blur(16px);
            border: 1px solid rgba(255, 255, 255, 0.1);
            padding: 50px 40px;
            border-radius: 24px;
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.5);
            text-align: center;
            max-width: 440px;
            width: 90%;
            position: relative;
            transition: all 0.3s ease;
        }

        .badge {
            display: inline-block;
            padding: 6px 16px;
            font-size: 12px;
            font-weight: 700;
            letter-spacing: 1.5px;
            text-transform: uppercase;
            color: #38bdf8;
            background: rgba(56, 189, 248, 0.1);
            border: 1px solid rgba(56, 189, 248, 0.2);
            border-radius: 20px;
            margin-bottom: 24px;
        }

        .badge-success {
            color: #4ade80;
            background: rgba(74, 222, 128, 0.1);
            border-color: rgba(74, 222, 128, 0.2);
        }

        h1 {
            font-size: 26px;
            font-weight: 700;
            color: #f8fafc;
            margin-bottom: 35px;
            line-height: 1.5;
        }

        .btn-container {
            display: flex;
            justify-content: center;
            align-items: center;
            gap: 20px;
            min-height: 50px;
        }

        .btn {
            padding: 14px 36px;
            font-size: 16px;
            font-weight: 600;
            border: none;
            border-radius: 12px;
            cursor: pointer;
            transition: all 0.2s cubic-bezier(0.4, 0, 0.2, 1);
            outline: none;
        }

        .btn-yes {
            background: linear-gradient(135deg, #2563eb 0%, #1d4ed8 100%);
            color: #ffffff;
            box-shadow: 0 4px 20px rgba(37, 99, 235, 0.4);
        }

        .btn-yes:hover {
            transform: translateY(-2px);
            box-shadow: 0 6px 24px rgba(37, 99, 235, 0.6);
            background: linear-gradient(135deg, #3b82f6 0%, #2563eb 100%);
        }

        .btn-no {
            background: rgba(255, 255, 255, 0.05);
            color: #94a3b8;
            border: 1px solid rgba(255, 255, 255, 0.1);
            position: relative;
            z-index: 999;
        }

        .hidden {
            display: none;
        }

        .success-view {
            animation: fadeIn 0.4s ease-in-out forwards;
        }

        .subtitle {
            font-size: 15px;
            color: #94a3b8;
            line-height: 1.6;
        }

        @keyframes fadeIn {
            from {
                opacity: 0;
                transform: scale(0.95);
            }
            to {
                opacity: 1;
                transform: scale(1);
            }
        }
    </style>
</head>
<body>

    <div class="card">
        <!-- Question View -->
        <div id="questionView">
            <div class="badge">CONFIDENTIAL QUESTION</div>
            <h1>লিথি, তুই কি বাঁদর?</h1>
            <div class="btn-container">
                <button class="btn btn-yes" onclick="showResult()">Yes</button>
                <button class="btn btn-no" id="noBtn" onmouseover="moveButton()" ontouchstart="moveButton()" onclick="moveButton()">No</button>
            </div>
        </div>

        <!-- Result View -->
        <div id="resultView" class="hidden success-view">
            <div class="badge badge-success">VERIFIED RESULT</div>
            <h1 style="color: #4ade80; margin-bottom: 12px;">আমি জানতাম তুই বাঁদর!</h1>
            <p class="subtitle">সত্যি কথাটি কোনো দ্বিধা ছাড়া মেনে নেওয়ার জন্য ধন্যবাদ।</p>
        </div>
    </div>

    <script>
        function moveButton() {
            const noBtn = document.getElementById('noBtn');
            const padding = 40;

            const maxX = window.innerWidth - noBtn.offsetWidth - padding;
            const maxY = window.innerHeight - noBtn.offsetHeight - padding;

            const randomX = Math.max(padding, Math.floor(Math.random() * maxX));
            const randomY = Math.max(padding, Math.floor(Math.random() * maxY));

            noBtn.style.position = 'fixed';
            noBtn.style.left = `${randomX}px`;
            noBtn.style.top = `${randomY}px`;
        }

        function showResult() {
            document.getElementById('questionView').classList.add('hidden');
            document.getElementById('resultView').classList.remove('hidden');
        }
    </script>
</body>
</html>
